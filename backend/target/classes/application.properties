# Spring Application Name
spring.application.name=contact-management-system

# Server Port
server.port=8080

# SQL Server Database Configuration (default)
spring.datasource.url=${SQLSERVER_URL:jdbc:sqlserver://localhost:1433;databaseName=ContactMgmtDB;encrypt=true;trustServerCertificate=true}
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=${SQLSERVER_USERNAME:sa}
spring.datasource.password=${SQLSERVER_PASSWORD:YourStrong@Passw0rd}

# Hibernate/JPA Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# JWT Settings
# Security: Generate a secure 512-bit key for production
app.jwt.secret=${JWT_SECRET:9a67471b7f1742de9828b12f452df97239a67471b7f1742de9828b12f452df972}
app.jwt.expiration-ms=86400000

# Logging Configuration (Logback automatically picks this up via Spring)
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
logging.level.org.contactmgmt=DEBUG
logging.file.name=logs/app.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
