spring.datasource.url=${SQLSERVER_URL:jdbc:sqlserver://localhost:1433;databaseName=ContactMgmtDB;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${SQLSERVER_USERNAME:sa}
spring.datasource.password=${SQLSERVER_PASSWORD:YourStrong@Passw0rd}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
logging.level.org.contactmgmt=DEBUG
